<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FH Edge — First-Half Goals</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
</head>
<body><style>
  :root{
    --page:#f7f8f6; --surface:#fdfdfc; --surface-2:#f0f1ed;
    --ink:#0b0b0b; --ink-2:#50524d; --muted:#8a8c85;
    --grid:#e2e3dc; --baseline:#c2c4bb; --border:rgba(11,11,11,.10);
    --scored:#2a78d6; --conceded:#e34948; --accent:#0b7a3b;
    --pitch:#e7eee4; --pitch-line:#c8d5c2;
    --el:38%; --es:58%;           /* edge-color lightness/saturation, light theme */
    --live:#c73535;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --page:#0d0d0d; --surface:#1a1a19; --surface-2:#242522;
      --ink:#ffffff; --ink-2:#c3c4bb; --muted:#8a8c85;
      --grid:#2c2d2a; --baseline:#3a3b37; --border:rgba(255,255,255,.10);
      --scored:#3987e5; --conceded:#e66767; --accent:#31a35d;
      --pitch:#20261e; --pitch-line:#39443a;
      --el:52%; --es:52%;
      --live:#e05a5a;
    }
  }
  :root[data-theme="light"]{
    --page:#f7f8f6; --surface:#fdfdfc; --surface-2:#f0f1ed;
    --ink:#0b0b0b; --ink-2:#50524d; --muted:#8a8c85;
    --grid:#e2e3dc; --baseline:#c2c4bb; --border:rgba(11,11,11,.10);
    --scored:#2a78d6; --conceded:#e34948; --accent:#0b7a3b;
    --pitch:#e7eee4; --pitch-line:#c8d5c2;
    --el:38%; --es:58%; --live:#c73535;
  }
  :root[data-theme="dark"]{
    --page:#0d0d0d; --surface:#1a1a19; --surface-2:#242522;
    --ink:#ffffff; --ink-2:#c3c4bb; --muted:#8a8c85;
    --grid:#2c2d2a; --baseline:#3a3b37; --border:rgba(255,255,255,.10);
    --scored:#3987e5; --conceded:#e66767; --accent:#31a35d;
    --pitch:#20261e; --pitch-line:#39443a;
    --el:52%; --es:52%; --live:#e05a5a;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{background:var(--page); color:var(--ink); margin:0;
    font:15px/1.45 system-ui,"Segoe UI",sans-serif;}
  .app{max-width:600px; margin:0 auto; padding:14px 12px 80px;}

  header.top{display:flex; align-items:center; gap:10px; padding:4px 2px 12px;}
  .badge45{background:var(--accent); color:#fff; font-weight:800; font-size:12px;
    border-radius:6px; padding:5px 6px; line-height:1; font-variant-numeric:tabular-nums;}
  .mkname{font-weight:800; letter-spacing:.12em; font-size:14px;}
  .mktag{color:var(--muted); font-size:11px; letter-spacing:.06em; text-transform:uppercase;}
  .clockbox{margin-left:auto; text-align:right;}
  .clock{font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.1;}
  .clocklab{font-size:10.5px; color:var(--muted); letter-spacing:.07em; text-transform:uppercase;}

  .replaybar{display:flex; align-items:center; gap:6px; background:var(--surface-2);
    border:1px solid var(--border); border-radius:10px; padding:7px 10px; margin-bottom:14px;
    font-size:12px; color:var(--ink-2); flex-wrap:wrap;}
  .replaybar b{color:var(--ink);}
  .replaybar .ctrls{margin-left:auto; display:flex; gap:5px;}
  .rbtn{font:inherit; font-size:12px; font-weight:650; padding:3px 10px; border-radius:16px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink-2); cursor:pointer;}
  .rbtn[aria-pressed="true"]{background:var(--ink); color:var(--page); border-color:var(--ink);}
  .rbtn:focus-visible{outline:2px solid var(--scored); outline-offset:2px;}

  .tabs{display:flex; gap:6px; margin:0 0 6px;}
  button.tab{flex:1; padding:9px 8px; border-radius:11px; border:1px solid var(--border);
    background:var(--surface); color:var(--ink-2); font:inherit; font-size:13.5px;
    font-weight:700; cursor:pointer;}
  button.tab[aria-pressed="true"]{background:var(--ink); color:var(--page); border-color:var(--ink);}
  button.tab:focus-visible{outline:2px solid var(--scored); outline-offset:2px;}
  .hotnote{font-size:12px; color:var(--ink-2); background:color-mix(in srgb, #eb6834 10%, transparent);
    border:1px solid var(--border); border-radius:9px; padding:7px 11px; margin-bottom:6px;}
  .search{width:100%; padding:10px 13px; border-radius:11px; border:1px solid var(--border);
    background:var(--surface); color:var(--ink); font:inherit; font-size:14px; margin:2px 0 4px;}
  .search::placeholder{color:var(--muted);}
  .search:focus{outline:2px solid var(--scored); outline-offset:1px;}
  .noresults{color:var(--muted); font-size:13px; text-align:center; padding:26px 0 8px;}
  h2.sect{font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    font-weight:750; margin:20px 2px 8px; display:flex; align-items:center; gap:7px;}
  h2.sect .livedot{width:8px; height:8px; border-radius:50%; background:var(--live);
    animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: reduce){ h2.sect .livedot{animation:none;} *{transition:none!important;} }

  /* ---------- match cards ---------- */
  .cards{display:flex; flex-direction:column; gap:8px;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:14px;
    overflow:hidden;}
  .chead{display:grid; grid-template-columns:6px 1fr auto; width:100%; text-align:left;
    background:none; border:none; color:var(--ink); font:inherit; cursor:pointer; padding:0;}
  .chead:focus-visible{outline:2px solid var(--scored); outline-offset:-2px;}
  .strip{background:hsl(var(--eh,120) var(--es) var(--el)); align-self:stretch;}
  .strip.off{background:var(--baseline);}
  .cmain{padding:11px 12px; min-width:0;}
  .cwhen{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;
    display:flex; gap:7px; align-items:center;}
  .cwhen .lv{color:var(--live); font-weight:750;}
  .cwhen .scr{color:var(--ink); font-weight:800; font-size:13px;}
  .cteams{font-weight:700; font-size:16px; margin-top:1px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;}
  .cteams .v{color:var(--muted); font-weight:400; padding:0 5px; font-size:13px;}
  .cbig{padding:10px 14px 10px 6px; align-self:center; flex:none; display:flex; gap:14px;}
  .cbig .pcell{text-align:right;}
  .cbig .pv{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1;
    color:hsl(var(--eh,120) var(--es) var(--el));}
  .cbig .pl{font-size:10px; color:var(--muted); margin-top:3px; max-width:78px; line-height:1.25;}
  .cbig.off .pv{color:var(--muted);}
  @media (max-width:380px){ .cbig{gap:9px;} .cbig .pv{font-size:19px;} }

  .cbody{border-top:1px solid var(--grid); padding:12px; display:none;}
  .card.open .cbody{display:block;}

  /* named stats tiles */
  .bigstats{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;}
  .bstat{background:var(--surface-2); border-radius:10px; padding:10px 12px;}
  .bstat .v{font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.1;}
  .bstat .l{font-size:12px; color:var(--ink-2); margin-top:2px; line-height:1.3;}
  .bstat .s{font-size:11px; color:var(--muted); margin-top:3px; font-variant-numeric:tabular-nums;}

  /* live panel */
  .livebox{border:1.5px solid var(--live); border-radius:12px; padding:11px 12px; margin-bottom:10px;}
  .lb-top{display:flex; align-items:baseline; gap:9px; flex-wrap:wrap;}
  .lb-min{color:var(--live); font-weight:800; font-size:13px;}
  .lb-score{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums;}
  .lb-note{font-size:11.5px; color:var(--muted); margin-left:auto;}
  .fhbar{position:relative; height:38px; background:var(--pitch); border-radius:8px; margin:10px 0 4px;}
  .fhbar .done{position:absolute; top:0; bottom:0; left:0; background:color-mix(in srgb, var(--accent) 16%, transparent); border-radius:8px 0 0 8px;}
  .fhbar .tick{position:absolute; top:5px; bottom:5px; width:1px; background:var(--pitch-line);}
  .fhbar .now{position:absolute; top:0; bottom:0; width:2px; background:var(--live);}
  .fhbar .dot{box-shadow:0 0 0 2px var(--pitch);}
  .fhbar .lbl{position:absolute; right:7px; top:50%; transform:translateY(-50%);
    font-size:10.5px; color:var(--muted); letter-spacing:.05em;}
  .liverows{display:flex; flex-direction:column; gap:7px; margin-top:9px;}
  .lrow{display:grid; grid-template-columns:minmax(120px,1.2fr) 1fr 44px; gap:9px; align-items:center;}
  .lrow .ll{font-size:12.5px; color:var(--ink-2); line-height:1.25;}
  .lrow .ll b{color:var(--ink);}
  .pbar{height:9px; background:var(--surface-2); border-radius:5px; position:relative; overflow:hidden;}
  .pbar i{position:absolute; inset:0 auto 0 0; border-radius:5px; background:hsl(var(--eh,120) var(--es) var(--el)); transition:width .5s;}
  .lrow .lp{font-size:14px; font-weight:800; text-align:right; font-variant-numeric:tabular-nums;}
  .lb-emp{font-size:11px; color:var(--muted); margin-top:7px;}
  .momwrap{margin-top:9px;}
  .momlab{font-size:10.5px; color:var(--muted); margin-bottom:3px;}
  .momgraph{position:relative; height:48px; background:var(--surface-2); border-radius:8px; overflow:hidden;}
  .momgraph .mline{position:absolute; left:0; right:0; top:50%; height:1px; background:var(--baseline);}
  .momgraph .mht{position:absolute; top:0; bottom:0; left:50%; width:1.5px; background:var(--baseline);}
  .mbar{position:absolute;}
  .mbar.h{bottom:50%; background:var(--accent); border-radius:2px 2px 0 0;}
  .mbar.a{top:50%; background:var(--conceded); border-radius:0 0 2px 2px;}
  .settled{background:var(--surface-2); border-radius:10px; padding:10px 12px; margin-bottom:10px;
    font-size:13px; color:var(--ink-2);}
  .settled b{color:var(--ink);}

  /* checkpoints */
  .ckcard{border:1px solid var(--grid); border-radius:10px; padding:10px 12px; margin-bottom:10px;}
  .ckcard h4{margin:0 0 1px; font-size:13px;}
  .ckcard .sub{color:var(--muted); font-size:11.5px; margin-bottom:8px; line-height:1.35;}
  table.cktab{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums;}
  .cktab th{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;
    font-weight:700; text-align:right; padding:3px 0 5px; border-bottom:1px solid var(--grid);}
  .cktab th:first-child{text-align:left;}
  .cktab td{padding:7px 0; border-bottom:1px solid var(--grid); font-size:13px; text-align:right;}
  .cktab tr:last-child td{border-bottom:none;}
  .cktab td:first-child{text-align:left; color:var(--ink-2);}
  .cktab .pc{font-weight:750; font-size:14.5px;}
  .cktab .n{color:var(--muted); font-size:11px; display:block;}

  /* team blocks */
  .tblock{margin-top:14px;}
  .tblock h4{margin:0; font-size:17px; font-weight:800; background:var(--surface-2);
    border-radius:9px; padding:8px 12px; letter-spacing:.01em;}
  .tblock h4 small{font-weight:600; font-size:11px; color:var(--muted); float:right;
    margin-top:4px; letter-spacing:.05em; text-transform:uppercase;}
  .tsub{color:var(--ink-2); font-size:11.5px; margin:6px 1px 9px; font-variant-numeric:tabular-nums;}
  .tsub .sc{color:var(--accent); font-weight:700;}
  .tsub .cn{color:var(--conceded); font-weight:700;}

  .bgrid{display:grid; grid-template-columns:56px repeat(6,1fr); gap:2.5px; margin-bottom:10px;}
  .bg-h{font-size:9.5px; color:var(--muted); text-align:center; font-variant-numeric:tabular-nums;}
  .bg-lab{font-size:10.5px; color:var(--ink-2); align-self:center; font-weight:600;}
  .bcell{border-radius:4px; text-align:center; font-size:11px; font-weight:650; padding:5px 0;
    color:var(--ink); font-variant-numeric:tabular-nums;}
  .bcell.ht,.bg-h.ht{position:relative;}
  .bcell.ht::before,.bg-h.ht::before{content:""; position:absolute; left:-2px; top:2px; bottom:2px;
    width:1.5px; background:var(--baseline);}
  .bg-h.ht::before{top:0; bottom:0;}

  .mgrid{--cols:36px minmax(0,1.3fr) auto minmax(0,1.3fr) minmax(80px,1.1fr) 18px; --bar:#26693a; --bar-line:rgba(255,255,255,.28);}
  @media (prefers-color-scheme: dark){ .mgrid{--bar:#1d4f2c; --bar-line:rgba(255,255,255,.22);} }
  :root[data-theme="dark"] .mgrid{--bar:#1d4f2c; --bar-line:rgba(255,255,255,.22);}
  :root[data-theme="light"] .mgrid{--bar:#26693a; --bar-line:rgba(255,255,255,.28);}
  .mhrow{display:grid; grid-template-columns:var(--cols); gap:6px; align-items:end;
    font-size:9.5px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase;
    padding:2px 0 4px; border-bottom:1px solid var(--grid);}
  .mrow{display:grid; grid-template-columns:var(--cols); gap:5px; align-items:center;
    padding:1.5px 0; border-bottom:1px solid var(--grid); font-size:11px;}
  .mrow .dt{color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; font-size:10.5px;}
  .mrow .hn{text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink-2);}
  .mrow .an{text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink-2);}
  .mrow .me{font-weight:750; color:var(--ink);}
  .res{font-size:10.5px; font-weight:750; padding:1px 5px; border-radius:4px; text-align:center;
    font-variant-numeric:tabular-nums; white-space:nowrap; color:var(--ink);}
  .res.w{background:color-mix(in srgb, #0ca30c 22%, transparent);}
  .res.d{background:color-mix(in srgb, #fab219 26%, transparent);}
  .res.l{background:color-mix(in srgb, #d03b3b 22%, transparent);}
  .mrow .fhn{text-align:center; font-variant-numeric:tabular-nums; font-weight:750; font-size:12px;}
  .mrow .fhn.z{color:var(--muted); font-weight:400;}
  .track2{position:relative; height:22px; background:var(--bar); border-radius:5px;}
  .track2 .tick{position:absolute; top:4px; bottom:4px; width:1px; background:var(--bar-line);}
  .track2 .htline{position:absolute; top:0; bottom:0; left:50%; width:2px; margin-left:-1px;
    background:rgba(0,0,0,.8);}
  .track2 .mk{position:absolute; top:50%; transform:translate(-50%,-50%); font-size:7.5px;
    font-weight:800; letter-spacing:.04em; color:#fff; background:rgba(0,0,0,.45);
    border-radius:3px; padding:1px 3px; line-height:1.2;}
  .fball{position:absolute; transform:translate(-50%,-50%); font-size:13px; line-height:1;
    cursor:default; user-select:none; text-shadow:0 0 2px rgba(0,0,0,.35);}
  .fball.est{opacity:.55;}

  .track{position:relative; height:32px; background:var(--pitch); border-radius:5px;}
  .track .tick{position:absolute; top:3px; bottom:3px; width:1px; background:var(--pitch-line);}
  .track .htline{position:absolute; top:1px; bottom:1px; width:2px; background:var(--baseline);}
  .dot{position:absolute; width:16px; height:16px; border-radius:50%; transform:translate(-50%,-50%);
    display:flex; align-items:center; justify-content:center; font-size:10px; line-height:1;
    box-shadow:0 0 0 1.5px var(--pitch); cursor:default; user-select:none;}
  .dot.s{background:var(--accent);}
  .dot.c{background:var(--conceded);}
  .dot.est{opacity:.55;}
  .scale{position:relative; height:13px;}
  .scale span{position:absolute; transform:translateX(-50%); font-size:9px; color:var(--muted);
    font-variant-numeric:tabular-nums; text-transform:none; letter-spacing:0;}

  .legend{display:flex; gap:12px; align-items:center; margin:8px 0 2px; font-size:11px;
    color:var(--ink-2); flex-wrap:wrap;}
  .legend .k{display:inline-flex; align-items:center; gap:5px;}
  .legend .k i{width:15px; height:15px; border-radius:50%; display:inline-flex; align-items:center;
    justify-content:center; font-style:normal; font-size:9px; line-height:1;}
  .legend .k i.s{background:var(--accent);}
  .legend .k i.c{background:var(--conceded);}
  .legend .k i.h{width:2px; height:10px; border-radius:1px; background:var(--baseline);}

  .cmpgrid{display:grid; grid-template-columns:1fr 1fr; gap:5px 7px; margin-top:6px;}
  .cmph{font-size:12px; font-weight:750; text-align:center; padding:5px 4px; background:var(--surface-2);
    border-radius:7px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .gcell{border:1px solid var(--grid); border-radius:8px; padding:4px 6px 5px; min-width:0;}
  .gcell.empty{border-style:dashed; opacity:.4;}
  .gcell .g1{display:flex; gap:5px; align-items:center; min-width:0; font-size:10.5px;}
  .gcell .gd{color:var(--muted); white-space:nowrap; font-size:9px;}
  .gcell .gopp{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink-2);}
  .gcell .res{font-size:10px; padding:0 4px;}
  .gcell .g2{display:flex; gap:4px; align-items:center; margin-top:3px;}
  .gcell .track2{flex:1; height:16px; border-radius:4px;}
  .gcell .track2 .tick{top:3px; bottom:3px;}
  .gcell .fball{font-size:10px;}
  .gcell .mk{font-size:6px; padding:0 2px; border-radius:2px;}
  .gcell .fhn{font-size:10.5px; width:12px; text-align:center; font-weight:750; font-variant-numeric:tabular-nums;}
  .gcell .fhn.z{color:var(--muted); font-weight:400;}
  .gtoggle{display:flex; justify-content:space-between; align-items:center; width:100%;
    font:inherit; font-size:14.5px; font-weight:800; color:var(--ink); background:var(--surface-2);
    border:1px solid var(--border); border-radius:9px; padding:9px 12px; margin-top:10px;
    cursor:pointer; text-align:left; letter-spacing:.01em;}
  .gtoggle .chev{font-size:11px; font-weight:650; color:var(--muted); letter-spacing:.05em;
    text-transform:uppercase;}
  .gtoggle:focus-visible{outline:2px solid var(--scored); outline-offset:2px;}
  .morebtn{display:block; width:100%; font:inherit; font-size:12px; color:var(--ink-2);
    background:var(--surface-2); border:1px solid var(--border); border-radius:8px;
    padding:6px; margin-top:7px; cursor:pointer;}
  .morebtn:focus-visible{outline:2px solid var(--scored); outline-offset:2px;}
  .nodata{font-size:11.5px; color:var(--muted); background:var(--surface-2); border-radius:8px;
    padding:7px 10px; margin-bottom:9px;}

  #tip{position:fixed; z-index:50; pointer-events:none; opacity:0; max-width:240px;
    background:var(--ink); color:var(--page); font-size:12px; line-height:1.35;
    padding:5px 9px; border-radius:6px; transition:opacity .08s; font-variant-numeric:tabular-nums;}

  @media (max-width:430px){
    .mgrid{--cols:36px minmax(0,1fr) auto minmax(0,1fr) minmax(96px,2.1fr) 18px;}
    .mrow{font-size:10.5px;}
    .cteams{font-size:15px;}
  }
</style>

<div class="app">
  <header class="top">
    <span class="badge45">45′</span>
    <div>
      <div class="mkname">FH&nbsp;EDGE</div>
      <div class="mktag">first-half goals</div>
    </div>
    <div class="clockbox">
      <div class="clock" id="clock">–:–</div>
      <div class="clocklab" id="clocklab">Sat 19 Oct 2024</div>
    </div>
  </header>

  <div class="replaybar">
    <span><b>LIVE</b> — Finland · data updated <b id="updAgo">just now</b></span>
    <span class="ctrls">
      <button class="rbtn" id="reloadBtn">Refresh</button>
    </span>
  </div>

  <div class="tabs">
    <button class="tab" data-tab="all" aria-pressed="true">All matches</button>
    <button class="tab" data-tab="hot" aria-pressed="false">🔥 Hot goals</button>
  </div>
  <div class="hotnote" id="hotnote" hidden></div>
  <input id="q" class="search" type="search" placeholder="Search team or league — e.g. Atlantis, Allsvenskan, K League…" autocomplete="off">
  <div id="list"></div>
</div>

/* ---------------- stats from data ---------------- */
const HT=(m)=>m.ht[0]+m.ht[1];
function teamStats(t){
  const M=t.matches,N=M.length;
  const fhFor=M.reduce((s,m)=>s+m.ht[0],0)/N, fhAg=M.reduce((s,m)=>s+m.ht[1],0)/N;
  const hasEv=M.some(m=>m.gf!==null);
  let scored=null,conceded=null,combined=null;
  if(hasEv){
    scored=[0,0,0,0,0,0]; conceded=[0,0,0,0,0,0]; combined=[0,0,0,0,0,0];
    const withEv=M.filter(m=>m.gf!==null);
    for(let b=0;b<6;b++){
      scored[b]=withEv.filter(m=>m.gf.some(g=>br(g)===b)).length/withEv.length;
      conceded[b]=withEv.filter(m=>m.ga.some(g=>br(g)===b)).length/withEv.length;
      combined[b]=withEv.filter(m=>m.gf.concat(m.ga).some(g=>br(g)===b)).length/withEv.length;
    }
  }
  return {fhFor,fhAg,scored,conceded,combined,N,hasEv};
}
function br(g){const m=g[0];if(m>=45&&g[1])return 2;if(m>90)return 5;return Math.min(5,Math.floor((m-0.001)/15));}
const fhOf=g=>g[0]<45||(g[0]===45); /* goal counts as FH if minute<=45 (incl 45+x) */

function pooled(fx){
  const A=(DATA.teams[fx.home]||{matches:[]}).matches, B=(DATA.teams[fx.away]||{matches:[]}).matches, M=A.concat(B), N=M.length;
  if(N<6)return null;
  const avg=M.reduce((s,m)=>s+HT(m),0)/N;
  const avg2=M.reduce((s,m)=>s+(m.ft[0]+m.ft[1]-m.ht[0]-m.ht[1]),0)/N;
  const p1=M.filter(m=>HT(m)>=1).length/N;
  const p2=M.filter(m=>HT(m)>=2).length/N;
  return {avg,avg2,p1,p2,N,M};
}
/* empirical checkpoint from matches that have minute data */
function ckEmp(M,t,need){
  const ev=M.filter(m=>m.gf!==null);
  const el=ev.filter(m=>!m.gf.concat(m.ga).some(g=>fhOf(g)&&g[0]<=t&&!(g[0]===45&&g[1])));
  if(!el.length)return null;
  const hit=el.filter(m=>m.gf.concat(m.ga).filter(g=>fhOf(g)&&(g[0]>t||(g[0]===45&&g[1]))).length>=need);
  return {n:el.length,hit:hit.length,p:hit.length/el.length};
}

/* ---------------- probability model ----------------
   λ = expected FH goals (pooled last-20 avg); minutes weighted by the league's
   real goal-time curve (computed from every cached goal event). */
const CURVE=DATA.curve; /* fraction of FH goals per bracket [0-15,15-30,30-45] */
const CURVE2=DATA.curve2||[0.30,0.31,0.39]; /* same for the second half [45-60,60-75,75-90] */
function wRemain(t){ /* share of FH goal-weight still to come at minute t (0-48, incl ~3' stoppage) */
  t=Math.max(0,Math.min(48,t));
  const STOP=CURVE[2]*3/15; /* stoppage scores at the 30-45 window's rate */
  if(t>=45)return STOP*(48-t)/3;
  const b=Math.min(2,Math.floor(t/15)), into=(t-b*15)/15;
  let rem=CURVE[b]*(1-into);
  for(let i=b+1;i<3;i++)rem+=CURVE[i];
  return rem+STOP;
}
function wRemain2(t){ /* share of SH goal-weight still to come at minute t (45-93) */
  t=Math.max(45,Math.min(93,t))-45;
  const STOP=CURVE2[2]*3/15;
  if(t>=45)return STOP*(48-t)/3;
  const b=Math.min(2,Math.floor(t/15)), into=(t-b*15)/15;
  let rem=CURVE2[b]*(1-into);
  for(let i=b+1;i<3;i++)rem+=CURVE2[i];
  return rem+STOP;
}
function pK(L,k){ if(k<=0)return 1; if(k===1)return 1-Math.exp(-L); return 1-Math.exp(-L)*(1+L); }
function pMore(lam,t,k){ return pK(lam*wRemain(t),k); }   /* first half */
function pMore2(lam,t,k){ return pK(lam*wRemain2(t),k); } /* second half */

/* ---------------- fixture live state (real time) ----------------
   API statuses at build time, extrapolated forward by the minutes
   elapsed since the data was fetched. */
function fxState(fx){
  const now=Date.now()/1000, dm=(now-DATA.builtAt)/60;
  if(fx.st==='NS'||fx.st==='TBD'){
    const mins=Math.max(0,Math.round((fx.ts-now)/60));
    return {st:'pre',mins};
  }
  if(fx.st==='1H'){
    const el=Math.min(49,Math.round((fx.el||0)+dm));
    return {st:'1h',el:Math.min(45,el),extra:Math.max(0,el-45)};
  }
  if(fx.st==='HT')return {st:'ht'};
  if(fx.st==='2H'||fx.st==='ET'||fx.st==='BT'||fx.st==='P')
    return {st:'2h',el:Math.min(94,Math.round((fx.el||46)+dm))};
  if(fx.st==='SUSP'||fx.st==='INT'||fx.st==='PST'||fx.st==='CANC'||fx.st==='ABD')
    return {st:'other',label:fx.st};
  return {st:'ft'};
}
function liveGoals(fx,s){ /* all recorded goals — they have already happened */
  return s.st==='pre'?[]:fx.goals;
}
function koLabel(fx){ /* kickoff in the viewer's own timezone */
  const d=new Date(fx.ts*1000), hm=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  const today=new Date();
  if(d.toDateString()===today.toDateString())return hm;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+hm;
}
const fhGoalsOf=(gs)=>gs.filter(g=>g.m<46);
const scoreOf=(gs)=>[gs.filter(g=>g.side==='h').length,gs.filter(g=>g.side==='a').length];
/* goal COUNTS come from the scoreboard (always current); the events list only
   places balls and can lag a refresh behind. */
function cntFH(fx){
  if(fx.st==='1H')return Math.max(fhGoalsOf(fx.goals).length,fx.cur[0]+fx.cur[1]);
  if(fx.ht)return fx.ht[0]+fx.ht[1];
  return fhGoalsOf(fx.goals).length;
}
function cntSH(fx){
  const ev=fx.goals.filter(g=>g.m>=46).length;
  if(fx.ht)return Math.max(ev,fx.cur[0]+fx.cur[1]-fx.ht[0]-fx.ht[1]);
  return ev;
}

const hueOf=p=>Math.round(Math.max(0,Math.min(1,(p-0.30)/0.60))*135); /* 30%→red(0) … 90%→green(135) */
const pct=v=>Math.round(v*100)+'%';
const fair=p=>p>0.02?(1/p).toFixed(2):'—';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');

const list=document.getElementById('list');

function headline(fx,s){ /* {p,label} for card right side + strip */
  const P=fx._p;
  if(!P)return {p:0,label:'no history yet',off:true};
  if(s.st==='pre')return {p:P.p1,label:'1+ FH goal',off:false};
  if(s.st==='1h'){
    const g=cntFH(fx), t=Math.min(48,s.el+(s.extra||0));
    return {p:pMore(P.avg,t,1),label:(g+1)+'+ FH goals by HT',off:false};
  }
  if(s.st==='ht'||s.st==='2h'){
    const g=cntSH(fx);
    const el=s.st==='ht'?45:Math.min(93,s.el);
    return {p:pMore2(P.avg2,el,1),label:(g+1)+'+ SH goals by FT',off:false};
  }
  return {p:0,label:'finished',off:true};
}

function cardHead(fx,s){
  const hl=headline(fx,s), hue=hueOf(hl.p);
  const gs=liveGoals(fx,s);
  const sc=s.st==='pre'?null:fx.cur;
  const lg='<span>'+esc(fx.lg)+'</span>';
  let when;
  if(s.st==='pre'){when=lg+'<span>'+koLabel(fx)+'</span>'+(s.mins<=120?'<span>in '+s.mins+' min</span>':'');}
  else if(s.st==='1h')when=lg+'<span class="lv">● '+s.el+(s.extra?'+'+s.extra:'')+'′</span><span class="scr">'+sc[0]+'–'+sc[1]+'</span>';
  else if(s.st==='ht')when=lg+'<span class="lv">HT</span><span class="scr">'+sc[0]+'–'+sc[1]+'</span>';
  else if(s.st==='2h')when=lg+'<span class="lv">● '+s.el+'′</span><span class="scr">'+sc[0]+'–'+sc[1]+'</span><span>2nd half</span>';
  else if(s.st==='other')when=lg+'<span>'+esc(s.label)+'</span>';
  else when=lg+'<span>FT</span><span class="scr">'+sc[0]+'–'+sc[1]+'</span>';
  const cell=(p,label)=>'<div class="pcell" style="--eh:'+hueOf(p)+'"><div class="pv">'+pct(p)+'</div><div class="pl">'+label+'</div></div>';
  let cells='';
  if(!hl.off&&fx._p){
    let p2,l2;
    if(s.st==='pre'){p2=fx._p.p2; l2='2+ FH goals';}
    else if(s.st==='1h'){const g=cntFH(fx); p2=pMore(fx._p.avg,Math.min(48,s.el+(s.extra||0)),2); l2=(g+2)+'+ by HT';}
    else{const g=cntSH(fx); const el=s.st==='ht'?45:Math.min(93,s.el);
      p2=pMore2(fx._p.avg2,el,2); l2=(g+2)+'+ SH by FT';}
    cells=cell(hl.p,hl.label)+cell(p2,l2);
  }
  const big=hl.off
    ?'<div class="cbig off"><div class="pcell"><div class="pv">'+cntFH(fx)+'</div><div class="pl">FH goals — settled</div></div></div>'
    :'<div class="cbig">'+cells+'</div>';
  return '<button class="chead" data-fx="'+fx.id+'" aria-expanded="'+(open===fx.id)+'">'
    +'<span class="strip'+(hl.off?' off':'')+'" style="--eh:'+hue+'"></span>'
    +'<span class="cmain"><span class="cwhen">'+when+'</span>'
    +'<div class="cteams">'+esc(fx.home)+'<span class="v">v</span>'+esc(fx.away)+'</div></span>'
    +big+'</button>';
}

function ckTable(fx){
  const P=fx._p;
  const rows=[[15,'Still 0–0 at 15′'],[30,'Still 0–0 at 30′']].map(([t,lab])=>{
    const e1=ckEmp(P.M,t,1), e2=ckEmp(P.M,t,2);
    const m1=pMore(P.avg,t,1), m2=pMore(P.avg,t,2);
    const c1=e1&&e1.n>=8?{p:e1.p,n:e1.hit+' of '+e1.n}:{p:m1,n:'model est.'};
    const c2=e2&&e2.n>=8?{p:e2.p,n:e2.hit+' of '+e2.n}:{p:m2,n:'model est.'};
    return '<tr><td>'+lab+'</td>'
      +'<td><span class="pc">'+pct(c1.p)+'</span><span class="n">'+c1.n+'</span></td>'
      +'<td><span class="pc">'+pct(c2.p)+'</span><span class="n">'+c2.n+'</span></td></tr>';
  }).join('');
  return '<div class="ckcard"><h4>In-play checkpoints</h4>'
    +'<div class="sub">If it’s still 0–0 at the checkpoint and the price is drifting — how often a goal (or two) still arrives before the break, in these teams’ last 20.</div>'
    +'<table class="cktab"><tr><th></th><th>1+ goal by HT</th><th>2+ goals by HT</th></tr>'+rows+'</table></div>';
}

    +'<div class="liverows">'
    +'<div class="lrow" style="--eh:'+hueOf(pNext)+'"><span class="ll"><b>'+(g+1)+'+ '+hName+' goals</b> — 1 more before '+endName+'</span><span class="pbar"><i style="width:'+(pNext*100)+'%"></i></span><span class="lp">'+pct(pNext)+'</span></div>'
    +'<div class="lrow" style="--eh:'+hueOf(p2tot)+'"><span class="ll"><b>'+(g+2)+'+ '+hName+' goals</b> — 2 more before '+endName+'</span><span class="pbar"><i style="width:'+(p2tot*100)+'%"></i></span><span class="lp">'+pct(p2tot)+'</span></div>'
    +'</div>'
    +(emp1&&emp1.n>=8?'<div class="lb-emp">History check: of their last-20 games still 0–0 at this minute, '+emp1.hit+' of '+emp1.n+' ('+pct(emp1.p)+') got a goal by HT.</div>':'')
    +momGraph(fx)
    +'</div>';
}
function momGraph(fx){
  const M=fx.mom;
  if(!M||M.length<2)return '<div class="lb-emp">Momentum graph: waiting on live stats — this league may not publish them.</div>';
  const W=[1,1,0.5]; /* shots, shots on target, corners */
  let bars='';
  for(let i=1;i<M.length;i++){
    const a=M[i-1],b=M[i];
    if(b.el==null||a.el==null||b.el<=a.el)continue;
    const d=(p,q)=>q?W.reduce((s,w,j)=>s+Math.max(0,(q[j]||0)-((p&&p[j])||0))*w,0):0;
    const ph=d(a.h,b.h), pa=d(a.a,b.a);
    const x=a.el/90*100, w=Math.max(1,(b.el-a.el)/90*100-0.4);
    if(ph>0)bars+='<div class="mbar h" style="left:'+x+'%;width:'+w+'%;height:'+Math.min(22,4+ph*4.5)+'px" data-tip="'+esc(fx.home)+' pressure '+a.el+'–'+b.el+'′"></div>';
    if(pa>0)bars+='<div class="mbar a" style="left:'+x+'%;width:'+w+'%;height:'+Math.min(22,4+pa*4.5)+'px" data-tip="'+esc(fx.away)+' pressure '+a.el+'–'+b.el+'′"></div>';
  }
  if(!bars)return '';
  return '<div class="momwrap"><div class="momlab">Momentum — shots &amp; corners per update: '+esc(fx.home)+' above the line, '+esc(fx.away)+' below</div>'
    +'<div class="momgraph"><div class="mline"></div><div class="mht"></div>'+bars+'</div></div>';
}

function settledBox(fx,s){
  const sc=fx.ht||scoreOf(fhGoalsOf(liveGoals(fx,s))), n=cntFH(fx), P=fx._p;
  return '<div class="settled">First half: <b>'+sc[0]+'–'+sc[1]+'</b> ('+n+' FH goal'+(n===1?'':'s')+'). '
    +'Pre-match the last-20 rate was <b>'+pct(P.p1)+'</b> for 1+ and <b>'+pct(P.p2)+'</b> for 2+.</div>';
}

const BR=['0–15','15–30','30–45','45–60','60–75','75–90'];
function bgridHTML(st,name){
  if(!st.scored)return '';
  let h='<div class="bgrid"><span></span>';
  BR.forEach((b,i)=>h+='<div class="bg-h'+(i===3?' ht':'')+'">'+b+'</div>');
  const row=(lab,arr,vn,verb)=>{
    h+='<div class="bg-lab">'+lab+'</div>';
    arr.forEach((p,i)=>{
      h+='<div class="bcell'+(i===3?' ht':'')+'" data-tip="'+esc(name)+' '+verb+' in the '+BR[i]+' window in '+pct(p)+' of recent games" style="background:color-mix(in srgb, var(--'+vn+') '+Math.round(p*58)+'%, transparent)">'+pct(p)+'</div>';
    });
  };
  row('Any goal',st.combined,'scored','saw a goal either end');
  row('Scored',st.scored,'accent','scored');
  row('Conceded',st.conceded,'conceded','conceded');
  return h+'</div>';
}
function trackHTML(m,teamName,compact){
  /* single uncluttered bar: plain footballs, HT + FT markers on the bar */
  const ticks=[15,30,60,75].map(t=>'<div class="tick" style="left:'+(t/90*100)+'%"></div>').join('');
  let goals=[];
  const add=(g,verb,est)=>goals.push({mm:g[0]+(g[1]?0.4:0),lab:g[0]+(g[1]?'+'+g[1]:'')+'′',verb,est});
  if(m.gf!==null){
    m.gf.forEach(g=>add(g,esc(teamName)+' scored',false));
    m.ga.forEach(g=>add(g,'conceded',false));
  }else{
    const put=(nFH,nSH,verb)=>{
      for(let i=0;i<nFH;i++)add([Math.round((i+1)*45/(nFH+1)),0],verb,true);
      for(let i=0;i<nSH;i++)add([45+Math.round((i+1)*45/(nSH+1)),0],verb,true);
    };
    put(m.ht[0],m.ft[0]-m.ht[0],esc(teamName)+' scored');
    put(m.ht[1],m.ft[1]-m.ht[1],'conceded');
  }
  goals.sort((a,b)=>a.mm-b.mm);
  /* vertical scatter when balls bunch up, like the classic look */
  const offs=compact?[0,-3,3]:[0,-5,5,-3,3]; let run=0,lastX=-99;
  const mid=compact?8:11;
  let h='<div class="track2">'+ticks+'<div class="htline"></div>'
    +'<span class="mk" style="left:50%">HT</span><span class="mk" style="left:96%">FT</span>';
  goals.forEach(g=>{
    const x=Math.max(3,Math.min(93,g.mm/90*100));
    run=(x-lastX<6)?run+1:0; lastX=x;
    const y=mid+offs[run%offs.length];
    h+='<span class="fball'+(g.est?' est':'')+'" data-tip="'+g.lab+(g.est?' (approx.)':'')+' · '+g.verb+'" style="left:'+x+'%;top:'+y+'px">⚽</span>';
  });
  return h+'</div>';
}
function scaleHTML(){
  return '<div class="scale">'+[0,15,30,45,60,75,90].map(t=>'<span style="left:'+Math.max(1.5,Math.min(98.5,t/90*100))+'%">'+(t===45?'HT':t)+'</span>').join('')+'</div>';
}
function combinedGrid(fx){
  const A=(DATA.teams[fx.home]||{matches:[]}).matches.filter(m=>m.gf!==null);
  const B=(DATA.teams[fx.away]||{matches:[]}).matches.filter(m=>m.gf!==null);
  const M=A.concat(B); if(M.length<10)return '';
  const arr=[];
  for(let b=0;b<6;b++)arr[b]=M.filter(m=>m.gf.concat(m.ga).some(g=>br(g)===b)).length/M.length;
  let h='<div class="tblock"><h4>Combined<small>'+M.length+' games — both teams pooled</small></h4>'
    +'<div class="tsub">how often each window saw a goal across both teams’ recent games, either end</div>'
    +'<div class="bgrid"><span></span>';
  BR.forEach((b,i)=>h+='<div class="bg-h'+(i===3?' ht':'')+'">'+b+'</div>');
  h+='<div class="bg-lab">Any goal</div>';
  arr.forEach((p,i)=>{
    h+='<div class="bcell'+(i===3?' ht':'')+'" data-tip="A goal landed in the '+BR[i]+' window in '+pct(p)+' of both teams’ recent games" style="background:color-mix(in srgb, var(--scored) '+Math.round(p*58)+'%, transparent)">'+pct(p)+'</div>';
  });
  return h+'</div></div>';
}
function teamGrids(t){
  const st=teamStats(t);
  return '<div class="tblock"><h4>'+esc(t.name)+'<small>last '+st.N+' games</small></h4>'
    +'<div class="tsub">most recent first — first half: <span class="sc">'+st.fhFor.toFixed(1)+' scored</span> · <span class="cn">'+st.fhAg.toFixed(1)+' conceded</span> per game</div>'
    +(st.hasEv?bgridHTML(st,t.name):'<div class="nodata">Goal-minute detail for this team fills in as the daily data quota refreshes — first-half counts in the game list are exact.</div>')
    +'</div>';
}
function gamesToggle(fx){
  const key=fx.id+'|cmp', on=!!openGames[key];
  let h='<button class="gtoggle" data-games="'+esc(key)+'" aria-expanded="'+on+'">'
    +'Recent games — side by side<span class="chev">'+(on?'▾ hide':'▸ show')+'</span></button>';
  if(on)h+=compareMatches(fx);
  return h;
}
function gameCell(m,t){
  if(!m)return '<div class="gcell empty"></div>';
  const fh=HT(m);
  const wdl=m.ft[0]>m.ft[1]?'w':(m.ft[0]<m.ft[1]?'l':'d');
  return '<div class="gcell">'
    +'<div class="g1"><span class="gd">'+m.d+'</span>'
    +'<span class="gopp">'+(m.h?'v ':'@ ')+esc(m.opp)+'</span>'
    +'<span class="res '+wdl+'" data-tip="HT '+m.ht[0]+'–'+m.ht[1]+' (their score first)">'+m.ft[0]+'–'+m.ft[1]+'</span></div>'
    +'<div class="g2">'+trackHTML(m,t.name,true)
    +'<span class="fhn'+(fh===0?' z':'')+'">'+fh+'</span></div>'
    +'</div>';
}
function compareMatches(fx){
  const A=DATA.teams[fx.home]||{name:fx.home,matches:[]}, B=DATA.teams[fx.away]||{name:fx.away,matches:[]};
  const key=fx.id+'|cmp';
  const total=Math.max(A.matches.length,B.matches.length);
  const n=showAll[key]?total:Math.min(10,total);
  let h='<div class="tblock" style="margin-top:6px">'
    +'<div class="legend" style="margin:0 0 4px"><span class="k">⚽ goal — tap for minute</span><span class="k">score is the team’s own first — tap it for HT</span><span class="k">v home · @ away</span></div>'
    +'<div class="cmpgrid"><div class="cmph">'+esc(fx.home)+'</div><div class="cmph">'+esc(fx.away)+'</div>';
  for(let i=0;i<n;i++)h+=gameCell(A.matches[i],A)+gameCell(B.matches[i],B);
  h+='</div>';
  if(total>10)h+='<button class="morebtn" data-more="'+esc(key)+'">'+(showAll[key]?'Show fewer':'Show all '+total+' games')+'</button>';
  return h+'</div>';
}

function cardBody(fx,s){
  const P=fx._p;
  if(!P)return '<div class="nodata">Not enough recorded games for these teams yet.</div>';
  let h='';
  if(s.st==='1h'||s.st==='ht'||s.st==='2h')h+=liveBox(fx,s);
  if(s.st==='ft')h+=settledBox(fx,s);
  h+='<div class="bigstats">'
    +'<div class="bstat"><div class="v" style="color:hsl('+hueOf(P.p1)+' var(--es) var(--el))">'+pct(P.p1)+'</div><div class="l">1+ goal in the first half</div><div class="s">fair odds '+fair(P.p1)+' · last '+P.N+' pooled</div></div>'
    +'<div class="bstat"><div class="v" style="color:hsl('+hueOf(P.p2)+' var(--es) var(--el))">'+pct(P.p2)+'</div><div class="l">2+ goals in the first half</div><div class="s">fair odds '+fair(P.p2)+' · avg '+P.avg.toFixed(1)+' FH goals</div></div>'
    +'</div>';
  h+=ckTable(fx);
  h+=combinedGrid(fx);
  h+=teamGrids(DATA.teams[fx.home]);
  h+=teamGrids(DATA.teams[fx.away]);
  h+=gamesToggle(fx);
  return h;
}

let Q='', TAB='all', HOTMIN=Infinity;
function orderGroups(){
  const live1=[],pre=[],live2=[],done=[];
  let pool=Q?DATA.fixtures.filter(fx=>(fx.home+' '+fx.away+' '+fx.lg).toLowerCase().includes(Q)):DATA.fixtures;
  if(TAB==='hot')pool=pool.filter(fx=>fx._p&&fx._p.avg>=HOTMIN);
  pool.forEach(fx=>{
    const s=fxState(fx);
    if(s.st==='1h')live1.push(fx);
    else if(s.st==='pre')pre.push(fx);
    else if(s.st==='ht'||s.st==='2h')live2.push(fx);
    else done.push(fx);
  });
  pre.sort((a,b)=>a.ts-b.ts); live1.sort((a,b)=>a.ts-b.ts);
  live2.sort((a,b)=>a.ts-b.ts); done.sort((a,b)=>b.ts-a.ts);
  return {live1,pre,live2,done};
}

function render(){
  const g=orderGroups();
  let h='';
  const section=(title,arr,liveDot)=>{
    if(!arr.length)return;
    h+='<h2 class="sect">'+(liveDot?'<span class="livedot"></span>':'')+title+'</h2><div class="cards">';
    arr.forEach(fx=>{
      const s=fxState(fx);
      h+='<div class="card'+(open===fx.id?' open':'')+'" id="card-'+fx.id+'">'+cardHead(fx,s)
        +'<div class="cbody">'+(open===fx.id?cardBody(fx,s):'')+'</div></div>';
    });
    h+='</div>';
  };
  section('First half — live now',g.live1,true);
  section('Up next',g.pre,false);
  section('Second half — in play',g.live2,true);
  section('Finished',g.done,false);
  if(!h)h='<div class="noresults">No matches found'+(Q?' for “'+esc(Q)+'”':'')+'.</div>';
  list.innerHTML=h;
}

/* ---------------- real clock + auto refresh ---------------- */
const clockEl=document.getElementById('clock');
const loadedAt=Date.now();
function fmtClock(){const d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function updLabel(){
  const mins=Math.max(0,Math.round((Date.now()/1000-DATA.builtAt)/60));
  document.getElementById('updAgo').textContent=mins<1?'just now':mins+' min ago';
  const dl=document.getElementById('clocklab');
  const d=new Date();
  dl.textContent=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+d.getDate()+' '
    +['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' · LIVE';
}
function tick(){ clockEl.textContent=fmtClock(); updLabel(); render(); }
setInterval(tick,30000);
/* pull a fresh build of the page every few minutes while visible */
setInterval(()=>{ if(!document.hidden && Date.now()-loadedAt>210000) location.reload(); },15000);
document.getElementById('reloadBtn').addEventListener('click',()=>location.reload());
document.getElementById('q').addEventListener('input',e=>{Q=e.target.value.trim().toLowerCase(); render();});
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  TAB=b.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));
  const n=document.getElementById('hotnote');
  n.hidden=TAB!=='hot';
  if(TAB==='hot')n.textContent='🔥 Top 20% of today’s board by first-half goals — showing games whose teams average '+HOTMIN.toFixed(1)+'+ FH goals over their last 20.';
  render();
}));

/* ---------------- events ---------------- */
list.addEventListener('click',e=>{
  const more=e.target.closest('[data-more]');
  if(more){showAll[more.dataset.more]=!showAll[more.dataset.more]; render(); return;}
  const gt=e.target.closest('[data-games]');
  if(gt){openGames[gt.dataset.games]=!openGames[gt.dataset.games]; render(); return;}
  const hd=e.target.closest('[data-fx]');
  if(hd){const id=+hd.dataset.fx; open=(open===id?null:id); render();
    if(open!==null){const el=document.getElementById('card-'+id); if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
  }
});
const tip=document.getElementById('tip');
function showTip(t,x,y){tip.textContent=t.dataset.tip; tip.style.opacity=1;
  const w=tip.offsetWidth; tip.style.left=Math.max(8,Math.min(innerWidth-w-8,x+12))+'px';
  tip.style.top=Math.max(8,y-34)+'px';}
document.addEventListener('pointermove',e=>{
  if(e.pointerType!=='mouse')return;
  const t=e.target.closest('[data-tip]'); if(t)showTip(t,e.clientX,e.clientY); else tip.style.opacity=0;});
document.addEventListener('pointerdown',e=>{
  const t=e.target.closest('[data-tip]');
  if(t&&e.pointerType!=='mouse'){showTip(t,e.clientX,e.clientY); setTimeout(()=>tip.style.opacity=0,2200);}
});

/* ---------------- init ---------------- */
DATA.fixtures.forEach(fx=>fx._p=pooled(fx));
(function(){ /* hot cutoff = 80th percentile of pooled FH averages */
  const avgs=DATA.fixtures.filter(fx=>fx._p).map(fx=>fx._p.avg).sort((a,b)=>a-b);
  if(avgs.length)HOTMIN=avgs[Math.min(avgs.length-1,Math.floor(avgs.length*0.8))];
})();
clockEl.textContent=fmtClock();
updLabel();
render();
</script>

</body>
</html>
